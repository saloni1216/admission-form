<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admission Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body{
         background-color: rgb(189, 189, 237);
      }
    </style>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <form
      action="https://api.web3forms.com/submit"
      method="POST"
      class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg space-y-4"
    >
      <!-- Access Key -->
      <input
        type="hidden"
        name="access_key"
        value="9583402e-dcae-45de-a659-20a477d4f631"
      />

      <h2 class="text-2xl font-bold text-center text-gray-700 mb-4">
        Admission Form
      </h2>

      <!-- Full Name -->
      <div>
        <label class="block text-gray-600 mb-1" for="name">Full Name</label>
        <input
          type="text"
          id="name"
          name="name"
          required
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Age -->
      <div>
        <label class="block text-gray-600 mb-1" for="age">Age</label>
        <input
          type="number"
          id="age"
          name="age"
          required
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-600 mb-1" for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- City -->
      <div>
        <label class="block text-gray-600 mb-1" for="city">City</label>
        <input
          type="text"
          id="city"
          name="city"
          required
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Course -->
      <div>
        <label class="block text-gray-600 mb-1" for="course">Course</label>
        <input
          type="text"
          id="course"
          name="course"
          required
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Father's Name -->
      <div>
        <label class="block text-gray-600 mb-1" for="fathername"
          >Father's Name</label
        >
        <input
          type="text"
          id="fathername"
          name="fathername"
          required
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Mother's Name -->
      <div>
        <label class="block text-gray-600 mb-1" for="mothername"
          >Mother's Name</label
        >
        <input
          type="text"
          id="mothername"
          name="mothername"
          required
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Honeypot -->
      <input
        type="checkbox"
        name="botcheck"
        class="hidden"
        style="display: none"
      />

      <!-- Submit Button -->
      <button
        type="submit"
        class="w-full bg-blue-500 text-white p-2 rounded-lg hover:bg-blue-600 transition"
      >
        Submit Admission Form
      </button>
      <script>window.$zoho=window.$zoho || {};$zoho.salesiq=$zoho.salesiq||{ready:function(){}}</script><script id="zsiqscript" src="https://salesiq.zohopublic.in/widget?wc=siqa5ae54a5e6edb782f35ce2a18718812ad4b046eba8cce88361854e9cc51b1cb2" defer></script>
    </form>
  </body>
</html>
